<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Buchstabenlabyrinth</title>

    <style>
      :root {
        color: #202020;
        background: #ebe6dc;
        font-family:
          Avenir Next,
          Segoe UI,
          Helvetica Neue,
          Helvetica,
          sans-serif;
        font-synthesis: none;
        text-rendering: optimizeLegibility;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-width: 320px;
        margin: 0;
      }

      button,
      input,
      select {
        font: inherit;
      }

      .app {
        display: grid;
        grid-template-columns: minmax(260px, 336px) minmax(0, 1fr);
        gap: 20px;
        min-height: 100vh;
        padding: 20px;
      }

      .controls {
        align-self: start;
        position: sticky;
        top: 20px;
        display: grid;
        gap: 16px;
        padding: 18px;
        color: #f7f4ec;
        background: #18201c;
        border: 1px solid #2f3b34;
        border-radius: 8px;
        box-shadow: 0 18px 45px rgb(38 28 11 / 18%);
      }

      .screen-title {
        margin: 0 0 2px;
        color: #f9d64a;
        font-family: Georgia, Charter, serif;
        font-size: clamp(1.8rem, 6vw, 2.7rem);
        font-weight: 750;
        line-height: 0.92;
      }

      .control-group {
        display: grid;
        gap: 10px;
      }

      label {
        display: grid;
        gap: 7px;
        color: #d9e0d7;
        font-size: 0.82rem;
        font-weight: 800;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      input,
      select {
        width: 100%;
        min-height: 42px;
        padding: 9px 10px;
        color: #161815;
        background: #fffaf0;
        border: 1px solid #8a928a;
        border-radius: 6px;
        outline: 0;
      }

      input:focus,
      select:focus {
        border-color: #f9d64a;
        box-shadow: 0 0 0 3px rgb(249 214 74 / 28%);
      }

      .button-row {
        display: grid;
        gap: 8px;
      }

      button {
        min-height: 42px;
        padding: 10px 12px;
        color: #11140f;
        font-weight: 850;
        background: #f9d64a;
        border: 1px solid #f9d64a;
        border-radius: 6px;
        cursor: pointer;
      }

      button.secondary {
        color: #f7f4ec;
        background: #24312a;
        border-color: #556357;
      }

      button:hover {
        filter: brightness(1.04);
      }

      button:active {
        transform: translateY(1px);
      }

      .status {
        min-height: 1.25em;
        margin: 0;
        color: #f2b6a0;
        font-size: 0.9rem;
        line-height: 1.35;
      }

      .worksheet {
        min-width: 0;
        padding: clamp(16px, 3vw, 32px);
        background: #fffdf8;
        border: 1px solid #d2cabd;
        border-radius: 8px;
        box-shadow: 0 18px 45px rgb(58 46 24 / 12%);
      }

      .sheet-header {
        display: flex;
        flex-wrap: wrap;
        align-items: end;
        justify-content: space-between;
        gap: 10px 18px;
        margin-bottom: 16px;
        padding-bottom: 12px;
        border-bottom: 2px solid #1f211e;
      }

      .print-title {
        margin: 0;
        font-family: Georgia, Charter, serif;
        font-size: clamp(1.5rem, 4vw, 2.2rem);
        line-height: 1;
      }

      .worksheet-meta {
        color: #39423b;
        font-size: 0.95rem;
        font-weight: 800;
      }

      .print-fields {
        display: none;
      }

      #worksheet {
        width: 100%;
        overflow: auto;
      }

      #worksheet svg {
        display: block;
        width: min(100%, 720px);
        height: auto;
      }

      @media (max-width: 760px) {
        .app {
          grid-template-columns: 1fr;
          padding: 12px;
        }

        .controls {
          position: static;
        }
      }

      @page {
        size: A4 portrait;
        margin: 12mm;
      }

      @media print {
        :root {
          color: #000;
          background: #fff;
        }

        body {
          margin: 0;
        }

        .app {
          display: block;
          min-height: auto;
          padding: 0;
        }

        .controls {
          display: none;
        }

        .worksheet {
          padding: 0;
          background: #fff;
          border: 0;
          border-radius: 0;
          box-shadow: none;
        }

        .sheet-header {
          margin-bottom: 8mm;
          padding-bottom: 5mm;
          border-bottom: 1.4pt solid #000;
        }

        .print-title {
          font-size: 22pt;
        }

        .worksheet-meta {
          color: #000;
          font-size: 11pt;
        }

        .print-fields {
          display: grid;
          grid-template-columns: 1fr 48mm;
          gap: 12mm;
          width: 100%;
          margin: 0 0 7mm;
          font-size: 11pt;
          font-weight: 700;
        }

        .print-fields span {
          display: block;
          padding-bottom: 2mm;
          border-bottom: 1pt solid #000;
        }

        #worksheet {
          overflow: visible;
        }

        #worksheet svg {
          width: 100%;
          max-height: 228mm;
        }
      }
    </style>
  </head>

  <body>
    <div class="app">
      <aside class="controls" aria-label="Einstellungen">
        <h1 class="screen-title">Buchstaben&shy;labyrinth</h1>

        <div class="control-group">
          <label>
            Variante
            <select id="kind">
              <option value="maze" selected>Labyrinth</option>
              <option value="wordSearch">Wortsuchbild</option>
            </select>
          </label>

          <label>
            Lösungswort
            <input id="word" value="DRACHE" autocomplete="off" />
          </label>

          <label>
            Größe
            <select id="size">
              <option value="8">8 × 8</option>
              <option value="10" selected>10 × 10</option>
              <option value="12">12 × 12</option>
            </select>
          </label>

          <label>
            Schwierigkeit
            <select id="difficulty">
              <option value="easy">Leicht</option>
              <option value="medium" selected>Mittel</option>
              <option value="hard">Schwer</option>
            </select>
          </label>
        </div>

        <div class="button-row">
          <button id="generate" type="button">Neu erzeugen</button>
          <button id="toggle-solution" class="secondary" type="button">Lösung anzeigen</button>
          <button id="print" class="secondary" type="button">Drucken</button>
        </div>

        <p id="status" class="status" role="status" aria-live="polite"></p>
      </aside>

      <main class="worksheet">
        <header class="sheet-header">
          <h1 id="print-title" class="print-title">Buchstabenlabyrinth</h1>
          <div id="worksheet-meta" class="worksheet-meta"></div>
        </header>
        <div class="print-fields" aria-hidden="true">
          <span>Name</span>
          <span>Datum</span>
        </div>
        <div id="worksheet"></div>
      </main>
    </div>

    <script type="module" src="/main.ts"></script>
  </body>
</html>
